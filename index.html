<!DOCTYPE html>
<html>
    <head>
        <title>RAGgy - RAG Model</title>
        <link rel="icon" type="image/png" href="icon.png">
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="title-div">
            <img src="icon.png" width="32px" height="32px"> <span class="title">RAGgy</span>
        </div>
        <hr>
        <div id="chat-window" >
        </div>
        <form id="query-form">
            <input type="text" id="prompt" name="prompt" autocomplete="off" class="text-input" required>
            <button type="submit" id="send-button">Send</button>
        </form>
        <p id="query-status"></p>
        <hr>
        <div id="upload-window">
            <form id="upload-form">
                <input type="file" accept=".txt" id="file-input" required>
                <button type="submit" id="upload-button">Upload</button>
            </form>
            <p id="upload-status"></p>
        </div>
        <b>API Key</b> <input type="password" id="api-key" class="text-input"><span id="api-key-status"></span>
        <script src="script.js"></script>
        <br>
        <a href="https://github.com/jpython28/raggy-frontend" style="font-size: 8px;">Github Repository</a>
    </body>
</html>
